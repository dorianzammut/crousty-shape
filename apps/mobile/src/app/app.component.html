<div class="min-h-screen bg-black text-white overflow-x-hidden">
  <!-- Platform Switcher -->
  <div class="fixed top-4 right-4 z-[100]">
    <button
      (click)="toggleAdmin()"
      class="bg-zinc-800/80 backdrop-blur-md border border-zinc-700 px-3 py-1.5 rounded-full text-[10px] font-black uppercase tracking-widest text-yellow-400 hover:bg-zinc-700 transition-all shadow-xl"
    >
      {{ isAdminView ? 'Switch to App' : 'Switch to Admin' }}
    </button>
  </div>

  <!-- Main Content -->
  <main [class]="isAdminView ? '' : 'pb-24'">
    <div [class]="isAdminView ? 'w-full' : 'w-full max-w-md mx-auto px-4 pt-6'">
      <router-outlet />
    </div>
  </main>

  <!-- Bottom Navigation -->
  @if (showBottomNav) {
    <app-bottom-nav />
  }
</div>

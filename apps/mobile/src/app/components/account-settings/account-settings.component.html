<div class="space-y-6 pb-8">

  <!-- Header -->
  <header class="flex items-center gap-3">
    <button
      (click)="back()"
      class="w-9 h-9 bg-zinc-900 border border-zinc-800 rounded-full flex items-center justify-center text-zinc-400 hover:text-white transition-colors shrink-0"
    >
      <lucide-icon name="chevron-left" [size]="20"></lucide-icon>
    </button>
    <h2 class="text-2xl font-black uppercase italic tracking-tight">
      Paramètres <span class="text-yellow-400">du compte</span>
    </h2>
  </header>

  <!-- Avatar -->
  <div class="bg-zinc-900 border border-zinc-800 rounded-2xl p-5 space-y-4">
    <p class="text-xs font-bold uppercase tracking-widest text-zinc-500">Photo de profil</p>
    <div class="flex items-center gap-5">
      <div
        class="w-20 h-20 rounded-full border-4 flex items-center justify-center shrink-0 transition-all"
        [style.background-color]="avatarColor() + '22'"
        [style.border-color]="avatarColor()"
        [style.box-shadow]="'0 0 30px ' + avatarColor() + '44'"
      >
        <span class="font-black text-2xl uppercase" [style.color]="avatarColor()">{{ userInitial }}</span>
      </div>
      <div class="flex gap-3 flex-wrap">
        @for (color of avatarColors; track color) {
          <button
            (click)="selectColor(color)"
            class="w-9 h-9 rounded-full transition-all hover:scale-110 active:scale-95 focus:outline-none"
            [style.background-color]="color"
            [class.ring-2]="avatarColor() === color"
            [class.ring-white]="avatarColor() === color"
            [class.ring-offset-2]="avatarColor() === color"
            [class.ring-offset-zinc-900]="avatarColor() === color"
          ></button>
        }
      </div>
    </div>
  </div>

  <!-- Profile info -->
  <div class="bg-zinc-900 border border-zinc-800 rounded-2xl p-5 space-y-4">
    <p class="text-xs font-bold uppercase tracking-widest text-zinc-500">Informations personnelles</p>

    <div class="space-y-3">
      <div>
        <label class="text-[10px] font-bold uppercase text-zinc-500 block mb-1.5">Nom</label>
        <div class="relative">
          <lucide-icon name="user" [size]="16" class="absolute left-3.5 top-1/2 -translate-y-1/2 text-zinc-500 pointer-events-none"></lucide-icon>
          <input
            type="text"
            [value]="name()"
            (input)="name.set($any($event.target).value)"
            placeholder="Ton prénom"
            class="w-full bg-zinc-800 border border-zinc-700 rounded-xl pl-10 pr-4 py-3 text-white placeholder-zinc-600 text-sm focus:outline-none focus:border-yellow-400 transition-colors"
          />
        </div>
      </div>

      <div>
        <label class="text-[10px] font-bold uppercase text-zinc-500 block mb-1.5">Email</label>
        <div class="relative">
          <lucide-icon name="mail" [size]="16" class="absolute left-3.5 top-1/2 -translate-y-1/2 text-zinc-500 pointer-events-none"></lucide-icon>
          <input
            type="email"
            [value]="email()"
            (input)="email.set($any($event.target).value)"
            placeholder="ton@email.com"
            class="w-full bg-zinc-800 border border-zinc-700 rounded-xl pl-10 pr-4 py-3 text-white placeholder-zinc-600 text-sm focus:outline-none focus:border-yellow-400 transition-colors"
          />
        </div>
      </div>
    </div>

    <button
      (click)="saveProfile()"
      [disabled]="savingProfile()"
      class="w-full py-3 rounded-xl bg-yellow-400 text-black font-black text-sm hover:bg-yellow-300 active:scale-[0.98] transition-all disabled:opacity-50 flex items-center justify-center gap-2"
    >
      @if (savingProfile()) {
        <lucide-icon name="refresh-cw" [size]="16" class="animate-spin"></lucide-icon>
      } @else {
        <lucide-icon name="check" [size]="16"></lucide-icon>
        Sauvegarder
      }
    </button>
  </div>

  <!-- Password -->
  <div class="bg-zinc-900 border border-zinc-800 rounded-2xl p-5 space-y-4">
    <p class="text-xs font-bold uppercase tracking-widest text-zinc-500">Sécurité</p>

    <div class="space-y-3">
      <div>
        <label class="text-[10px] font-bold uppercase text-zinc-500 block mb-1.5">Mot de passe actuel</label>
        <div class="relative">
          <lucide-icon name="lock" [size]="16" class="absolute left-3.5 top-1/2 -translate-y-1/2 text-zinc-500 pointer-events-none"></lucide-icon>
          <input
            [type]="showCurrentPwd() ? 'text' : 'password'"
            [value]="currentPassword()"
            (input)="currentPassword.set($any($event.target).value)"
            placeholder="••••••••"
            class="w-full bg-zinc-800 border border-zinc-700 rounded-xl pl-10 pr-11 py-3 text-white placeholder-zinc-600 text-sm focus:outline-none focus:border-yellow-400 transition-colors"
          />
          <button
            (click)="showCurrentPwd.set(!showCurrentPwd())"
            class="absolute right-3.5 top-1/2 -translate-y-1/2 text-zinc-500 hover:text-zinc-300 transition-colors"
          >
            <lucide-icon [name]="showCurrentPwd() ? 'eye-off' : 'eye'" [size]="16"></lucide-icon>
          </button>
        </div>
      </div>

      <div>
        <label class="text-[10px] font-bold uppercase text-zinc-500 block mb-1.5">Nouveau mot de passe</label>
        <div class="relative">
          <lucide-icon name="lock" [size]="16" class="absolute left-3.5 top-1/2 -translate-y-1/2 text-zinc-500 pointer-events-none"></lucide-icon>
          <input
            [type]="showNewPwd() ? 'text' : 'password'"
            [value]="newPassword()"
            (input)="newPassword.set($any($event.target).value)"
            placeholder="••••••••"
            class="w-full bg-zinc-800 border border-zinc-700 rounded-xl pl-10 pr-11 py-3 text-white placeholder-zinc-600 text-sm focus:outline-none focus:border-yellow-400 transition-colors"
          />
          <button
            (click)="showNewPwd.set(!showNewPwd())"
            class="absolute right-3.5 top-1/2 -translate-y-1/2 text-zinc-500 hover:text-zinc-300 transition-colors"
          >
            <lucide-icon [name]="showNewPwd() ? 'eye-off' : 'eye'" [size]="16"></lucide-icon>
          </button>
        </div>
      </div>

      <div>
        <label class="text-[10px] font-bold uppercase text-zinc-500 block mb-1.5">Confirmer le nouveau mot de passe</label>
        <div class="relative">
          <lucide-icon name="lock" [size]="16" class="absolute left-3.5 top-1/2 -translate-y-1/2 text-zinc-500 pointer-events-none"></lucide-icon>
          <input
            type="password"
            [value]="confirmPassword()"
            (input)="confirmPassword.set($any($event.target).value)"
            placeholder="••••••••"
            class="w-full bg-zinc-800 border border-zinc-700 rounded-xl pl-10 pr-4 py-3 text-white placeholder-zinc-600 text-sm focus:outline-none focus:border-yellow-400 transition-colors"
          />
        </div>
      </div>
    </div>

    <button
      (click)="savePassword()"
      [disabled]="savingPassword()"
      class="w-full py-3 rounded-xl bg-zinc-800 border border-zinc-700 text-white font-black text-sm hover:bg-zinc-700 active:scale-[0.98] transition-all disabled:opacity-50 flex items-center justify-center gap-2"
    >
      @if (savingPassword()) {
        <lucide-icon name="refresh-cw" [size]="16" class="animate-spin"></lucide-icon>
      } @else {
        <lucide-icon name="lock" [size]="16"></lucide-icon>
        Modifier le mot de passe
      }
    </button>
  </div>

  <!-- Danger zone -->
  <div class="bg-zinc-900 border border-red-900/30 rounded-2xl p-5 space-y-3">
    <p class="text-xs font-bold uppercase tracking-widest text-red-500/70">Zone de danger</p>
    <button
      (click)="back()"
      class="w-full py-3 rounded-xl border border-red-900/50 text-red-500 font-bold text-sm hover:bg-red-500/10 transition-colors"
    >
      Supprimer mon compte
    </button>
  </div>

  <!-- Toast -->
  @if (toast()) {
    <div
      class="fixed bottom-10 left-1/2 -translate-x-1/2 text-white text-sm font-bold px-5 py-3 rounded-2xl shadow-xl z-50 border whitespace-nowrap"
      [class.bg-zinc-800]="toast()!.type === 'success'"
      [class.border-zinc-600]="toast()!.type === 'success'"
      [class.bg-red-900]="toast()!.type === 'error'"
      [class.border-red-700]="toast()!.type === 'error'"
    >
      {{ toast()!.msg }}
    </div>
  }

</div>

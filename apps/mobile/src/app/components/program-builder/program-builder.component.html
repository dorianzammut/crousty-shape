<div class="space-y-8">
  <header class="flex justify-between items-center">
    <h2 class="text-2xl font-black uppercase italic tracking-tight">
      Tes <span class="text-yellow-400">Programmes</span>
    </h2>
    <button class="w-10 h-10 bg-zinc-900 border border-zinc-800 rounded-full flex items-center justify-center text-yellow-400 hover:bg-zinc-800 transition-colors">
      <lucide-icon name="plus" [size]="24"></lucide-icon>
    </button>
  </header>

  <!-- Coach Library -->
  <div class="space-y-4">
    <div class="flex items-center gap-2">
      <lucide-icon name="book-open" [size]="18" class="text-yellow-400"></lucide-icon>
      <h3 class="font-bold text-xs uppercase tracking-widest text-zinc-500">Bibliothèque des Coachs</h3>
    </div>

    @if (loading()) {
      <div class="py-10 text-center text-zinc-500 text-sm">Chargement des programmes...</div>
    }

    <div class="space-y-4">
      @for (prog of coachPrograms(); track prog.id) {
        <div class="relative bg-zinc-900 rounded-3xl p-6 border border-zinc-800 overflow-hidden group">
          <div class="absolute top-0 right-0 w-32 h-32 bg-yellow-400/5 blur-3xl rounded-full -mr-10 -mt-10 group-hover:bg-yellow-400/10 transition-colors"></div>

          <div class="flex justify-between items-start mb-6">
            <div>
              <h4 class="text-xl font-black uppercase italic text-white group-hover:text-yellow-400 transition-colors">{{ prog.name }}</h4>
              <p class="text-zinc-500 text-sm flex items-center gap-1">
                <lucide-icon name="users" [size]="14"></lucide-icon>
                {{ prog.coach }}
              </p>
            </div>
            <span class="bg-yellow-400 text-black text-[10px] font-black px-2 py-1 rounded-md uppercase">
              {{ prog.level }}
            </span>
          </div>

          <div class="flex gap-4">
            <div class="flex items-center gap-1.5 text-zinc-400 text-xs">
              <lucide-icon name="clock" [size]="14" class="text-yellow-400"></lucide-icon>
              <span>{{ prog.duration }}</span>
            </div>
            <div class="flex items-center gap-1.5 text-zinc-400 text-xs">
              <lucide-icon name="flame" [size]="14" class="text-orange-500"></lucide-icon>
              <span>{{ prog.intensity }}</span>
            </div>
          </div>

          <button class="mt-6 w-full bg-white/5 py-3 rounded-xl font-bold text-sm hover:bg-white/10 transition-colors flex items-center justify-center gap-2">
            En savoir plus
            <lucide-icon name="chevron-right" [size]="16"></lucide-icon>
          </button>
        </div>
      }
    </div>
  </div>
</div>

<div class="flex h-screen bg-zinc-950 text-white overflow-hidden">
  <!-- Sidebar -->
  <aside [class]="sidebarOpen() ? 'w-64 flex-shrink-0' : 'w-16 flex-shrink-0'" class="bg-zinc-900 border-r border-zinc-800 flex flex-col transition-all duration-300">
    <!-- Logo -->
    <div class="p-4 border-b border-zinc-800 flex items-center gap-3">
      <div class="w-9 h-9 bg-yellow-400 rounded-xl flex items-center justify-center text-black flex-shrink-0">
        <lucide-icon name="dumbbell" [size]="20"></lucide-icon>
      </div>
      @if (sidebarOpen()) {
        <span class="font-black uppercase italic tracking-tighter text-lg">
          Crousty <span class="text-yellow-400">Admin</span>
        </span>
      }
    </div>

    <!-- Navigation -->
    <nav class="flex-1 p-3 space-y-1">
      @for (item of navItems; track item.path) {
        <a
          [routerLink]="item.path"
          routerLinkActive="bg-yellow-400/10 text-yellow-400 border-yellow-400/20"
          class="flex items-center gap-3 px-3 py-2.5 rounded-xl transition-colors text-zinc-400 hover:text-white hover:bg-zinc-800 border border-transparent"
        >
          <lucide-icon [name]="item.icon" [size]="18" class="flex-shrink-0"></lucide-icon>
          @if (sidebarOpen()) {
            <span class="text-sm font-medium">{{ item.label }}</span>
          }
        </a>
      }
    </nav>

    <!-- Bottom -->
    <div class="p-3 border-t border-zinc-800">
      @if (sidebarOpen()) {
        <div class="px-3 py-2 mb-2">
          <p class="text-xs text-zinc-500 truncate">{{ currentUser()?.email }}</p>
          <p class="text-xs text-yellow-400 font-medium">{{ currentUser()?.role }}</p>
        </div>
      }
      <button (click)="logout()" class="flex items-center gap-3 px-3 py-2.5 w-full rounded-xl text-zinc-500 hover:text-red-400 hover:bg-zinc-800 transition-colors">
        <lucide-icon name="log-out" [size]="18" class="flex-shrink-0"></lucide-icon>
        @if (sidebarOpen()) {
          <span class="text-sm font-medium">Déconnexion</span>
        }
      </button>
    </div>
  </aside>

  <!-- Main -->
  <div class="flex-1 flex flex-col min-w-0">
    <!-- Topbar -->
    <header class="bg-zinc-900/50 border-b border-zinc-800 px-6 py-4 flex items-center justify-between flex-shrink-0">
      <button (click)="toggleSidebar()" class="p-2 rounded-lg text-zinc-400 hover:text-white hover:bg-zinc-800 transition-colors">
        <lucide-icon name="menu" [size]="20"></lucide-icon>
      </button>

      <div class="flex items-center gap-4">
        <div class="relative">
          <lucide-icon name="search" [size]="16" class="absolute left-3 top-1/2 -translate-y-1/2 text-zinc-500"></lucide-icon>
          <input
            type="text"
            placeholder="Rechercher..."
            class="bg-zinc-800 rounded-lg py-2 pl-9 pr-4 text-sm w-56 focus:outline-none focus:ring-1 focus:ring-yellow-400 border-none"
          />
        </div>
        <button class="relative p-2 text-zinc-400 hover:text-yellow-400 transition-colors">
          <lucide-icon name="bell" [size]="18"></lucide-icon>
          <span class="absolute top-1.5 right-1.5 w-1.5 h-1.5 bg-yellow-400 rounded-full"></span>
        </button>
        <div class="flex items-center gap-2 pl-4 border-l border-zinc-800">
          <div class="w-8 h-8 rounded-full bg-yellow-400/20 border border-yellow-400/30 flex items-center justify-center">
            <lucide-icon name="user" [size]="14" class="text-yellow-400"></lucide-icon>
          </div>
          <span class="text-sm font-medium">{{ userLabel() }}</span>
        </div>
      </div>
    </header>

    <!-- Content -->
    <main class="flex-1 overflow-auto p-6">
      <router-outlet />
    </main>
  </div>
</div>

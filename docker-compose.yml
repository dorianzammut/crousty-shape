services:
  # ─────────────────────────────────────────────
  # PostgreSQL database
  # ─────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: crousty_shape
      POSTGRES_USER: ${POSTGRES_USER:-crousty}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-crousty_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-crousty} -d crousty_shape"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─────────────────────────────────────────────
  # NestJS API  →  http://localhost:3000
  # ─────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-crousty}:${POSTGRES_PASSWORD:-crousty_password}@postgres:5432/crousty_shape
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-change-in-production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID:-}
      FIREBASE_CLIENT_EMAIL: ${FIREBASE_CLIENT_EMAIL:-}
      FIREBASE_PRIVATE_KEY: ${FIREBASE_PRIVATE_KEY:-}
      PORT: 3000
      NODE_ENV: production
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # ─────────────────────────────────────────────
  # Angular Web Admin  →  http://localhost:4201
  # ─────────────────────────────────────────────
  web-admin:
    build:
      context: .
      dockerfile: apps/web-admin/Dockerfile
    ports:
      - "4201:80"
    depends_on:
      - api
    restart: unless-stopped

  # ─────────────────────────────────────────────
  # Angular Mobile (web)  →  http://localhost:4200
  # Note: native iOS/Android builds use Capacitor outside Docker
  # ─────────────────────────────────────────────
  mobile:
    build:
      context: .
      dockerfile: apps/mobile/Dockerfile
    ports:
      - "4200:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  postgres_data:
